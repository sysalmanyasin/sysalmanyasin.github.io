<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dua Pharma — Control Gateway</title>

<!-- Premium Cyber-Style Typography -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
  --font-sans: 'Plus Jakarta Sans', sans-serif;
  --font-display: 'Space Grotesk', sans-serif;
  
  /* Futuristic Tech Palette */
  --primary-glow: #00f2fe;
  --teal-primary: #00cbcb;
  --teal-dark: #004d4d;
  --bg-gradient: radial-gradient(circle at 50% 50%, #0d1527 0%, #040814 100%);
  
  --glass-bg: rgba(13, 25, 47, 0.55);
  --glass-border: rgba(0, 242, 254, 0.15);
  --glass-border-hover: rgba(0, 242, 254, 0.4);
  
  --text-main: #f1f5f9;
  --text-muted: #94a3b8;
  
  --radius-xl: 24px;
  --radius-md: 12px;
  --transition-cubic: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-gradient);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
  padding: 24px;
}

/* 🕸️ INTERACTIVE BACKGROUND CANVAS */
#particleCanvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* 💎 GLASSMORPHIC HUB CONTAINER */
.gateway-container {
  position: relative;
  z-index: 10;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  padding: 48px 40px;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
              0 0 40px rgba(0, 242, 254, 0.05);
  text-align: center;
  transition: var(--transition-cubic);
}

.gateway-container:hover {
  border-color: rgba(0, 242, 254, 0.25);
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
              0 0 50px rgba(0, 242, 254, 0.1);
}

/* 🛡️ INNOVATIVE BRAND ORB */
.brand-orb {
  width: 80px;
  height: 80px;
  background: radial-gradient(circle at 30% 30%, rgba(0, 242, 254, 0.2), transparent);
  border: 1px solid var(--primary-glow);
  border-radius: 50%;
  margin: 0 auto 28px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  position: relative;
  box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
  animation: float 4s ease-in-out infinite;
}

.brand-orb::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 1px dashed rgba(0, 242, 254, 0.4);
  animation: rotate 12s linear infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

@keyframes rotate {
  100% { transform: rotate(360deg); }
}

h1 {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #ffffff 0%, #a5f3fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 36px;
  font-weight: 400;
}

/* ⚡ INTERACTIVE INTERFACE LINK BLOCKS */
.nav-group {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.nav-link {
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 600;
  padding: 18px 24px;
  border-radius: var(--radius-md);
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: var(--transition-cubic);
  position: relative;
  overflow: hidden;
}

/* POS Terminal Button Style */
.nav-link.pos-btn {
  background: linear-gradient(135deg, rgba(0, 242, 254, 0.15) 0%, rgba(0, 203, 203, 0.05) 100%);
  color: var(--primary-glow);
  border: 1px solid var(--glass-border);
}

.nav-link.pos-btn:hover {
  border-color: var(--primary-glow);
  background: linear-gradient(135deg, rgba(0, 242, 254, 0.25) 0%, rgba(0, 203, 203, 0.1) 100%);
  transform: translateX(4px);
  box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
}

/* Audit Board Button Style */
.nav-link.audit-btn {
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-main);
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.nav-link.audit-btn:hover {
  border-color: rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.07);
  transform: translateX(4px);
}

.link-title {
  display: flex;
  align-items: center;
  gap: 14px;
}

.link-icon {
  font-size: 20px;
}

.arrow-action {
  font-size: 16px;
  opacity: 0.5;
  transition: var(--transition-cubic);
}

.nav-link:hover .arrow-action {
  opacity: 1;
  transform: translateX(3px);
}
</style>
</head>
<body>

<!-- Dynamic Particle Web Network Structure Background -->
<canvas id="particleCanvas"></canvas>

<div class="gateway-container">
  <!-- Interactive Identity Orb -->
  <div class="brand-orb">🛡️</div>
  
  <!-- Content Block -->
  <h1>Dua Pharma Gateway</h1>
  <p class="subtitle">Securely access network modules. Select your destination terminal below.</p>
  
  <!-- Direct Navigation to live URLs -->
  <div class="nav-group">
    <a href="https://pos.duapharma.com" class="nav-link pos-btn">
      <span class="link-title">
        <span class="link-icon">🛒</span>
        <span>POS Terminal</span>
      </span>
      <span class="arrow-action">→</span>
    </a>
    
    <a href="https://random.duapharma.com" class="nav-link audit-btn">
      <span class="link-title">
        <span class="link-icon">📊</span>
        <span>Audit Dashboard</span>
      </span>
      <span class="arrow-action">→</span>
    </a>
  </div>
</div>

<!-- 🧠 LIGHTWEIGHT LIVE INTERACTIVE BACKGROUND SCRIPT -->
<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');

let particles = [];
const particleCount = 40;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.radius = Math.random() * 2 + 1;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0, 242, 254, 0.25)';
    ctx.fill();
  }
}

for (let i = 0; i < particleCount; i++) {
  particles.push(new Particle());
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw connecting laser lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < 150) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(0, 242, 254, ${0.1 * (1 - dist / 150)})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }
  
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
